<style>
:root {
  --bg-base:#0a0a0f; --text-primary:#e5e5e5; --text-dim:rgba(255,255,255,0.3);
  --text-dimmer:rgba(255,255,255,0.12); --border-subtle:rgba(255,255,255,0.06);
  --border-light:rgba(255,255,255,0.08); --green:#4ade80; --green-dark:#22c55e;
  --blue:#3b82f6; --blue-light:#60a5fa; --surface:rgba(255,255,255,0.04);
  --amber:#f59e0b; --amber-dim:rgba(245,158,11,0.15);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg-base);color:var(--text-primary);min-height:100vh;min-height:100dvh;transition:background 0.8s ease;overscroll-behavior:none}
body.all-done{background:linear-gradient(170deg,#0a0f0a 0%,#0d1a12 40%,#0a1510 100%)}
.app{max-width:480px;margin:0 auto;padding:32px 16px 100px}

/* Quote */
.quote-block{margin-bottom:28px;padding:16px 18px;border-left:2px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.015);border-radius:0 8px 8px 0;transition:border-color 0.4s ease}
body.all-done .quote-block{border-left-color:rgba(74,222,128,0.25)}
.quote-text{font-style:italic;font-size:13px;line-height:1.6;color:rgba(255,255,255,0.4);margin-bottom:8px;transition:color 0.4s ease}
body.all-done .quote-text{color:rgba(74,222,128,0.5)}
.quote-attr{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.2);transition:color 0.4s ease}
body.all-done .quote-attr{color:rgba(74,222,128,0.35)}

/* Month nav */
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.nav-btn{background:rgba(255,255,255,0.05);border:1px solid var(--border-light);border-radius:10px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-primary);transition:background 0.2s}
.nav-btn:active{background:rgba(255,255,255,0.1)}
.month-label{text-align:center}
.month-label h1{font-size:22px;font-weight:700;line-height:1.2}
.go-today{font-family:'Space Mono',monospace;font-size:11px;color:rgba(255,255,255,0.25);letter-spacing:1px;cursor:pointer;text-transform:uppercase;border:none;background:none;transition:color 0.2s}
.go-today:active{color:rgba(255,255,255,0.5)}

/* Calendar */
.weekdays,.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.weekdays{margin-bottom:4px}
.wd{text-align:center;font-family:'Space Mono',monospace;font-size:10px;color:rgba(255,255,255,0.25);letter-spacing:1px;text-transform:uppercase;padding:6px 0}
.cal-grid{margin-bottom:28px}
.day-cell{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.03);transition:all 0.2s ease;user-select:none;-webkit-user-select:none}
.day-cell:active{background:rgba(255,255,255,0.08)}
.day-cell.selected{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.18)}
.day-cell.is-today{border-color:rgba(255,255,255,0.1)}
.day-num{font-size:14px;font-family:'Space Mono',monospace;color:#b0b0b0;transition:color 0.3s ease}
.day-cell.is-today .day-num{font-weight:700;color:#fff}
.day-cell.status-complete .day-num{color:var(--green)}
.day-dot{width:5px;height:5px;border-radius:50%;margin-top:3px;background:transparent;transition:background 0.3s ease}
.day-cell.status-complete .day-dot{background:var(--green)}
.day-cell.status-partial .day-dot{background:var(--blue)}
.day-cell.status-none .day-dot{background:rgba(255,255,255,0.15)}

.divider{height:1px;background:var(--border-subtle);margin-bottom:24px}

/* Day header */
.day-header{margin-bottom:16px}
.day-date{font-family:'Space Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:2.5px;color:var(--text-dim);margin-bottom:4px;transition:color 0.4s ease}
body.all-done .day-date{color:var(--green)}
.progress-wrap{margin-top:12px}
.progress-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.progress-label{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1px;color:var(--text-dim);transition:color 0.4s ease}
body.all-done .progress-label{color:var(--green)}
.progress-bar{height:3px;background:rgba(255,255,255,0.05);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--blue),var(--blue-light));transition:all 0.5s cubic-bezier(0.4,0,0.2,1)}
body.all-done .progress-fill{background:linear-gradient(90deg,var(--green-dark),var(--green))}

/* Input */
.input-row{display:flex;gap:8px;margin-bottom:16px}
.goal-input{flex:1;padding:12px 16px;background:rgba(255,255,255,0.045);border:1px solid rgba(255,255,255,0.07);border-radius:10px;color:var(--text-primary);font-size:16px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s}
.goal-input:focus{border-color:rgba(255,255,255,0.2)}
.goal-input::placeholder{color:rgba(255,255,255,0.2)}
.add-btn,.action-btn{padding:12px 18px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.09);border-radius:10px;color:var(--text-primary);font-size:15px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;transition:background 0.2s;white-space:nowrap}
.add-btn:active,.action-btn:active{background:rgba(255,255,255,0.12)}

/* Action row */
.action-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.action-btn{font-size:12px;padding:8px 14px;font-family:'Space Mono',monospace;letter-spacing:0.5px;color:rgba(255,255,255,0.5);border-color:rgba(255,255,255,0.06)}
.action-btn:active{color:var(--text-primary)}

/* Goals list */
.goals-list{display:flex;flex-direction:column;gap:6px}
.empty-state{text-align:center;padding:48px 20px;color:var(--text-dimmer);font-family:'Space Mono',monospace;font-size:12px;letter-spacing:1px}
.goal-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;background:var(--surface);border:1px solid var(--border-subtle);transition:all 0.35s cubic-bezier(0.4,0,0.2,1);cursor:pointer;user-select:none;-webkit-user-select:none}
.goal-item.done{background:rgba(255,255,255,0.02);border-color:rgba(255,255,255,0.05)}
body.all-done .goal-item.done{background:linear-gradient(135deg,#1a3a2a 0%,#0f2b1c 100%);border-color:rgba(74,222,128,0.3)}
.checkbox{width:22px;height:22px;min-width:22px;border-radius:6px;border:2px solid rgba(255,255,255,0.18);display:flex;align-items:center;justify-content:center;transition:all 0.3s ease;background:transparent}
.goal-item.done .checkbox{border-color:#6b7280;background:rgba(107,114,128,0.12)}
body.all-done .goal-item.done .checkbox{border-color:var(--green);background:rgba(74,222,128,0.12)}
.check-svg{display:none}
.goal-item.done .check-svg{display:block}
.goal-text{flex:1;font-size:15px;line-height:1.4;word-break:break-word;transition:all 0.3s ease}
.goal-item.done .goal-text{color:#6b7280;text-decoration:line-through;text-decoration-color:rgba(107,114,128,0.4)}
body.all-done .goal-item.done .goal-text{color:var(--green);text-decoration:none}
.del-btn{width:26px;height:26px;min-width:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;opacity:0.25;cursor:pointer;background:none;border:none;transition:opacity 0.2s}
.del-btn:active{opacity:0.7}

/* Victory */
.victory{text-align:center;margin-top:32px;padding:20px;border-radius:14px;background:rgba(74,222,128,0.05);border:1px solid rgba(74,222,128,0.12);display:none}
body.all-done .victory{display:block}
.victory-gg{font-size:24px;margin-bottom:6px}
.victory-text{font-family:'Space Mono',monospace;font-size:12px;color:var(--green);letter-spacing:1px}

/* Monthly goals */
.monthly-section{margin-top:36px}
.section-title{font-family:'Space Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:2.5px;color:var(--amber);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-title::before{content:'';display:block;width:12px;height:2px;background:var(--amber);border-radius:1px}
.monthly-progress{margin-bottom:12px}
.monthly-progress .progress-bar{height:3px;background:rgba(255,255,255,0.05);border-radius:4px;overflow:hidden;margin-top:6px}
.monthly-progress .progress-fill{background:linear-gradient(90deg,#d97706,var(--amber))}
.monthly-progress .progress-label{color:rgba(245,158,11,0.5)}
.monthly-goal-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;background:rgba(245,158,11,0.03);border:1px solid rgba(245,158,11,0.08);transition:all 0.35s cubic-bezier(0.4,0,0.2,1);cursor:pointer;user-select:none;-webkit-user-select:none}
.monthly-goal-item.done{background:rgba(245,158,11,0.06);border-color:rgba(245,158,11,0.2)}
.monthly-goal-item .checkbox{border-color:rgba(245,158,11,0.25)}
.monthly-goal-item.done .checkbox{border-color:var(--amber);background:rgba(245,158,11,0.15)}
.monthly-goal-item .goal-text{color:rgba(255,255,255,0.7)}
.monthly-goal-item.done .goal-text{color:var(--amber);text-decoration:none}
.monthly-input .goal-input{border-color:rgba(245,158,11,0.1)}
.monthly-input .goal-input:focus{border-color:rgba(245,158,11,0.3)}
.monthly-input .add-btn{border-color:rgba(245,158,11,0.12);color:rgba(245,158,11,0.6)}

/* Copy modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:#141419;border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:24px;width:100%;max-width:360px;max-height:80vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:700;margin-bottom:4px}
.modal p{font-size:13px;color:var(--text-dim);margin-bottom:16px}
.modal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:20px}
.modal-day{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:13px;color:#b0b0b0;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);cursor:pointer;transition:all 0.15s ease;user-select:none}
.modal-day:active,.modal-day.picked{background:rgba(59,130,246,0.15);border-color:rgba(59,130,246,0.4);color:var(--blue-light)}
.modal-day.is-src{opacity:0.3;pointer-events:none}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.modal-btn{padding:10px 20px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:background 0.2s}
.modal-btn.cancel{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.5)}
.modal-btn.confirm{background:rgba(59,130,246,0.2);color:var(--blue-light)}
.modal-btn:active{opacity:0.8}
</style>
</head>
<body>
<div class="app">
  <div class="quote-block"><div class="quote-text" id="quoteText"></div><div class="quote-attr" id="quoteAttr"></div></div>
  <div class="month-nav">
    <button class="nav-btn" id="prevMonth"><svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M12 4L6 10L12 16" stroke="#e5e5e5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    <div class="month-label"><h1 id="monthTitle"></h1><button class="go-today" id="goToday" style="display:none">Go to today</button></div>
    <button class="nav-btn" id="nextMonth"><svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M8 4L14 10L8 16" stroke="#e5e5e5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
  </div>
  <div class="weekdays"><div class="wd">Mon</div><div class="wd">Tue</div><div class="wd">Wed</div><div class="wd">Thu</div><div class="wd">Fri</div><div class="wd">Sat</div><div class="wd">Sun</div></div>
  <div class="cal-grid" id="calGrid"></div>
  <div class="divider"></div>
  <div class="day-header">
    <div class="day-date" id="dayDate"></div>
    <div class="progress-wrap" id="progressWrap" style="display:none">
      <div class="progress-info"><span class="progress-label" id="progressLabel"></span></div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
  </div>
  <div class="input-row">
    <input type="text" class="goal-input" id="goalInput" placeholder="Add a goal..." autocomplete="off">
    <button class="add-btn" id="addBtn">Add</button>
  </div>
  <div class="action-row" id="actionRow" style="display:none">
    <button class="action-btn" id="copyBtn">Copy to days...</button>
    <button class="action-btn" id="clearBtn">Clear day</button>
  </div>
  <div class="goals-list" id="goalsList"></div>
  <div class="victory"><div class="victory-gg">gg</div><div class="victory-text">ALL GOALS CRUSHED</div></div>

  <!-- Monthly goals -->
  <div class="monthly-section">
    <div class="divider" style="margin-top:32px"></div>
    <div class="section-title">Monthly Goals</div>
    <div class="monthly-progress" id="mProgressWrap" style="display:none">
      <div class="progress-info"><span class="progress-label" id="mProgressLabel"></span></div>
      <div class="progress-bar"><div class="progress-fill" id="mProgressFill"></div></div>
    </div>
    <div class="input-row monthly-input">
      <input type="text" class="goal-input" id="mGoalInput" placeholder="Add a monthly goal..." autocomplete="off">
      <button class="add-btn" id="mAddBtn">Add</button>
    </div>
    <div class="goals-list" id="mGoalsList"></div>
  </div>
</div>

<!-- Copy modal -->
<div class="modal-overlay" id="copyModal">
  <div class="modal">
    <h2>Copy goals to...</h2>
    <p id="copyModalInfo">Tap the days you want to copy to</p>
    <div class="weekdays" style="margin-bottom:4px"><div class="wd">M</div><div class="wd">T</div><div class="wd">W</div><div class="wd">T</div><div class="wd">F</div><div class="wd">S</div><div class="wd">S</div></div>
    <div class="modal-days" id="modalDays"></div>
    <div class="modal-actions">
      <button class="modal-btn cancel" id="copyCancel">Cancel</button>
      <button class="modal-btn confirm" id="copyConfirm">Copy</button>
    </div>
  </div>
</div>

<script>
const QUOTES=[
  {quote:"Repent! For tomorrow you die!",attr:"Dark Angels — Battle cry of the Unforgiven"},
  {quote:"By the Blood of Sanguinius!",attr:"Blood Angels — Sons of the Angel"},
  {quote:"Whilst we draw breath, we stand. Whilst we stand, we fight. Whilst we fight, we prevail.",attr:"Ultramarines — Marneus Calgar"},
  {quote:"There is only the Emperor, and he is our shield and protector.",attr:"Crimson Fists — Chapter Cult"},
  {quote:"Here we stand and here we shall die, unbroken and unbowed.",attr:"Howling Griffons — Revered-Ancient Armand Titus"},
  {quote:"Courage and honour are not merely words. They are the pillars upon which we build victory.",attr:"Nova Marines — Sons of Guilliman"},
  {quote:"No pity! No remorse! No fear!",attr:"Black Templars — Litany of the devoted"},
  {quote:"We are the Emperor's wrath made manifest. We do not ask for mercy, for we have none to give.",attr:"Flesh Tearers — Heirs of the Angel's rage"},
  {quote:"What is our quest? To purge our shame through the death of those who turned from the Lion.",attr:"Consecrators — Interrogator-Chaplain"},
  {quote:"A moment of laxity spawns a lifetime of heresy.",attr:"Angels of Vengeance — Creed of the Unforgiven"},
  {quote:"Iron within, iron without. Our shields are our faith, our swords are our duty.",attr:"Iron Knights — Dorn's legacy endures"},
  {quote:"That which causes us trials shall yield us triumph, and that which makes our hearts ache shall fill us with gladness.",attr:"Fulgrim — III Legion, Emperor's Children (pre-Heresy)"},
];

const SK='daily-goals-v4';
const MK='monthly-goals-v1';
let D={},M={};
const now=new Date();
let vY=now.getFullYear(),vM=now.getMonth(),sD=now.getDate();
let pickedDays=new Set();

const pad=n=>String(n).padStart(2,'0');
const dk=(y,m,d)=>`${y}-${pad(m+1)}-${pad(d)}`;
const mk=(y,m)=>`${y}-${pad(m+1)}`;
const dim=(y,m)=>new Date(y,m+1,0).getDate();
const fwd=(y,m)=>{const d=new Date(y,m,1).getDay();return d===0?6:d-1;};
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

function load(){
  try{D=JSON.parse(localStorage.getItem(SK)||'{}')}catch{D={}}
  try{M=JSON.parse(localStorage.getItem(MK)||'{}')}catch{M={}}
}
function save(){try{localStorage.setItem(SK,JSON.stringify(D))}catch{}}
function saveM(){try{localStorage.setItem(MK,JSON.stringify(M))}catch{}}

function render(){
  const key=dk(vY,vM,sD),goals=D[key]||[],dc=goals.filter(g=>g.done).length,ad=goals.length>0&&goals.every(g=>g.done);
  document.body.classList.toggle('all-done',ad);

  // Quote
  const q=QUOTES[vM];
  document.getElementById('quoteText').textContent=`"${q.quote}"`;
  document.getElementById('quoteAttr').textContent=`— ${q.attr}`;

  // Month
  document.getElementById('monthTitle').textContent=new Date(vY,vM).toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  const isCur=vY===now.getFullYear()&&vM===now.getMonth();
  document.getElementById('goToday').style.display=isCur?'none':'inline';

  // Calendar grid
  const g=document.getElementById('calGrid');g.innerHTML='';
  const td=dim(vY,vM),off=fwd(vY,vM);
  for(let i=0;i<off;i++)g.appendChild(document.createElement('div'));
  for(let d=1;d<=td;d++){
    const k=dk(vY,vM,d),dg=D[k]||[];
    let st='empty';
    if(dg.length>0){const dn=dg.filter(x=>x.done).length;st=dn===dg.length?'complete':dn>0?'partial':'none';}
    const c=document.createElement('div');
    c.className=`day-cell status-${st}${isCur&&d===now.getDate()?' is-today':''}${d===sD?' selected':''}`;
    c.innerHTML=`<span class="day-num">${d}</span><div class="day-dot"></div>`;
    c.addEventListener('click',()=>{sD=d;render();});
    g.appendChild(c);
  }

  // Day header
  document.getElementById('dayDate').textContent=new Date(vY,vM,sD).toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
  const pw=document.getElementById('progressWrap');
  if(goals.length>0){pw.style.display='block';document.getElementById('progressLabel').textContent=ad?'ALL DONE':`${dc} / ${goals.length}`;document.getElementById('progressFill').style.width=`${(dc/goals.length)*100}%`;}else{pw.style.display='none';}

  // Action row
  document.getElementById('actionRow').style.display=goals.length>0?'flex':'none';

  // Goals list
  const l=document.getElementById('goalsList');l.innerHTML='';
  if(goals.length===0){l.innerHTML='<div class="empty-state">No goals for this day</div>';}
  else goals.forEach(goal=>{
    const it=document.createElement('div');
    it.className=`goal-item${goal.done?' done':''}`;
    it.innerHTML=`<div class="checkbox"><svg class="check-svg" width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M2.5 7.5L5.5 10.5L11.5 3.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><span class="goal-text">${esc(goal.text)}</span><button class="del-btn"><svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M3 3L11 11M11 3L3 11" stroke="#e5e5e5" stroke-width="1.5" stroke-linecap="round"/></svg></button>`;
    it.addEventListener('click',e=>{if(e.target.closest('.del-btn'))return;goal.done=!goal.done;save();render();});
    it.querySelector('.del-btn').addEventListener('click',e=>{e.stopPropagation();D[key]=goals.filter(x=>x.id!==goal.id);if(D[key].length===0)delete D[key];save();render();});
    l.appendChild(it);
  });

  // Monthly goals
  renderMonthly();
}

function renderMonthly(){
  const mkey=mk(vY,vM),mgoals=M[mkey]||[];
  const mdc=mgoals.filter(g=>g.done).length;
  const mpw=document.getElementById('mProgressWrap');
  if(mgoals.length>0){
    mpw.style.display='block';
    const mad=mgoals.every(g=>g.done);
    document.getElementById('mProgressLabel').textContent=mad?'ALL MONTHLY GOALS DONE':`${mdc} / ${mgoals.length}`;
    document.getElementById('mProgressFill').style.width=`${(mdc/mgoals.length)*100}%`;
  }else{mpw.style.display='none';}

  const ml=document.getElementById('mGoalsList');ml.innerHTML='';
  if(mgoals.length===0){ml.innerHTML='<div class="empty-state">No monthly goals set</div>';}
  else mgoals.forEach(goal=>{
    const it=document.createElement('div');
    it.className=`monthly-goal-item${goal.done?' done':''}`;
    it.innerHTML=`<div class="checkbox"><svg class="check-svg" width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M2.5 7.5L5.5 10.5L11.5 3.5" stroke="${goal.done?'#f59e0b':'currentColor'}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><span class="goal-text">${esc(goal.text)}</span><button class="del-btn"><svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M3 3L11 11M11 3L3 11" stroke="#e5e5e5" stroke-width="1.5" stroke-linecap="round"/></svg></button>`;
    it.addEventListener('click',e=>{if(e.target.closest('.del-btn'))return;goal.done=!goal.done;saveM();renderMonthly();});
    it.querySelector('.del-btn').addEventListener('click',e=>{e.stopPropagation();M[mkey]=mgoals.filter(x=>x.id!==goal.id);if(M[mkey].length===0)delete M[mkey];saveM();renderMonthly();});
    ml.appendChild(it);
  });
}

// Daily actions
function addGoal(){const i=document.getElementById('goalInput'),t=i.value.trim();if(!t)return;const k=dk(vY,vM,sD);if(!D[k])D[k]=[];D[k].push({id:Date.now(),text:t,done:false});save();i.value='';i.focus();render();}
function clearDay(){const k=dk(vY,vM,sD);delete D[k];save();render();}

// Monthly actions
function addMonthlyGoal(){const i=document.getElementById('mGoalInput'),t=i.value.trim();if(!t)return;const k=mk(vY,vM);if(!M[k])M[k]=[];M[k].push({id:Date.now(),text:t,done:false});saveM();i.value='';i.focus();renderMonthly();}

// Copy modal
function openCopyModal(){
  pickedDays=new Set();
  const modal=document.getElementById('copyModal');
  const grid=document.getElementById('modalDays');
  grid.innerHTML='';
  const td=dim(vY,vM),off=fwd(vY,vM);
  for(let i=0;i<off;i++)grid.appendChild(document.createElement('div'));
  for(let d=1;d<=td;d++){
    const cell=document.createElement('div');
    cell.className=`modal-day${d===sD?' is-src':''}`;
    cell.textContent=d;
    if(d!==sD){
      cell.addEventListener('click',()=>{
        if(pickedDays.has(d)){pickedDays.delete(d);cell.classList.remove('picked');}
        else{pickedDays.add(d);cell.classList.add('picked');}
      });
    }
    grid.appendChild(cell);
  }
  document.getElementById('copyModalInfo').textContent=`Copy goals from day ${sD} to:`;
  modal.classList.add('open');
}

function closeCopyModal(){document.getElementById('copyModal').classList.remove('open');}

function confirmCopy(){
  const srcKey=dk(vY,vM,sD);
  const srcGoals=D[srcKey]||[];
  if(srcGoals.length===0||pickedDays.size===0){closeCopyModal();return;}
  pickedDays.forEach(d=>{
    const tgtKey=dk(vY,vM,d);
    const existing=D[tgtKey]||[];
    const existingTexts=new Set(existing.map(g=>g.text));
    const newGoals=srcGoals.filter(g=>!existingTexts.has(g.text)).map(g=>({id:Date.now()+Math.random()*1000,text:g.text,done:false}));
    D[tgtKey]=[...existing,...newGoals];
  });
  save();closeCopyModal();render();
}

// Init
load();render();
document.getElementById('prevMonth').addEventListener('click',()=>{if(vM===0){vM=11;vY--;}else vM--;sD=1;render();});
document.getElementById('nextMonth').addEventListener('click',()=>{if(vM===11){vM=0;vY++;}else vM++;sD=1;render();});
document.getElementById('goToday').addEventListener('click',()=>{vY=now.getFullYear();vM=now.getMonth();sD=now.getDate();render();});
document.getElementById('addBtn').addEventListener('click',addGoal);
document.getElementById('goalInput').addEventListener('keydown',e=>{if(e.key==='Enter')addGoal();});
document.getElementById('copyBtn').addEventListener('click',openCopyModal);
document.getElementById('clearBtn').addEventListener('click',clearDay);
document.getElementById('copyCancel').addEventListener('click',closeCopyModal);
document.getElementById('copyConfirm').addEventListener('click',confirmCopy);
document.getElementById('copyModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeCopyModal();});
document.getElementById('mAddBtn').addEventListener('click',addMonthlyGoal);
document.getElementById('mGoalInput').addEventListener('keydown',e=>{if(e.key==='Enter')addMonthlyGoal();});
</script>
</body>
</html>
